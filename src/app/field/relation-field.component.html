<div class="custom-select-container" (clickOutside)="close()">
    <div class="select-box" 
        (click)="toggleOpen()" 
        [class.active]="isOpen"
        [class.loading]="isLoading"
        [title]="value?.display_name || ''">
        
        <span class="selected-text">
        {{ value ? value.display_name : 'Select...' }}
        </span>
        
        <span class="arrow" [class.up]="isOpen">▼</span>
    </div>

    <div class="dropdown-panel" *ngIf="isOpen && !isLoading">
        <div *ngFor="let opt of (options$ | async)" 
            class="option-item"
            [class.selected]="(opt.id === null && !value) || (opt.id === value?.id)"
            [class.empty-action]="opt.id === null"
            (click)="selectOption(opt)"
            [title]="opt.display_name">
        {{ opt.display_name }}
        </div>
    </div>

    <div class="loading-overlay" *ngIf="isLoading">
        <span>Loading...</span>
    </div>
</div>
